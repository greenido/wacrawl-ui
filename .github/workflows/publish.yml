name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare npm token
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NPM_TOKEN:-}" ]]; then
            echo "NPM_TOKEN secret is missing or empty"
            exit 1
          fi

          # Guard against accidental CR/LF in secrets that can break HTTP headers.
          CLEAN_NPM_TOKEN="$(printf '%s' "$NPM_TOKEN" | tr -d '\r\n')"
          if [[ -z "$CLEAN_NPM_TOKEN" ]]; then
            echo "NPM_TOKEN secret is invalid after sanitization"
            exit 1
          fi

          echo "::add-mask::$CLEAN_NPM_TOKEN"
          echo "NODE_AUTH_TOKEN=$CLEAN_NPM_TOKEN" >> "$GITHUB_ENV"

      - name: Publish
        run: npm publish --provenance --access public
